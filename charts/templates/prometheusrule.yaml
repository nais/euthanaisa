{{- if .Values.alerts }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: "{{ .Release.Name }}"
spec:
  groups:
    - name: "{{ .Release.Name }}"
      rules:
        - alert: EuthanaisaNotRunning
          expr: kube_job_complete{job_name="euthanaisa"} == 0
          for: 6h
          labels:
            namespace: nais-system
            severity: warning
          annotations:
            consequence: Workloads that should be removed, aren't.
            action: "Check logs in euthanaisa"
        - alert: EuthanaisaErrors
          expr: increase(euthanaisa_errors_total[30m]) > 0
          for: 5m
          labels:
            namespace: nais-system
            severity: warning
          annotations:
            consequence: "Resources that should be removed aren't."
            action: "Check euthanaisa logs"
{{- end }}
