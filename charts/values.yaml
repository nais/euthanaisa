image:
  repository: europe-north1-docker.pkg.dev/nais-io/nais/images
  name: euthanaisa

pushgateway:
  endpoint: ""

apiserverIP: ""

schedule: "*/2 * * * *"

alerts: true

logLevel: debug
logFormat: json

resources:
  - resource: deployments
    group: apps
    version: v1
  - resource: cronjobs
    group: batch
    version: v1
  - resource: jobs
    group: batch
    version: v1
  - resource: applications
    group: nais.io
    version: v1alpha1
  - resource: naisjobs
    group: nais.io
    version: v1
  - resource: roles
    group: rbac.authorization.k8s.io
    version: v1
  - resource: rolebindings
    group: rbac.authorization.k8s.io
    version: v1
  - resource: aivenapplications
    group: aiven.nais.io
    version: v1
